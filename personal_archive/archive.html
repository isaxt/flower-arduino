<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>personal archive · the blooming in small machines</title>
  <link rel="icon" type="image/png" href="../breadboard_fav.png" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2e5f4;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.15);
      --border-strong: rgba(0,0,0,0.5);
      --text: #1a1a18;
      --text-muted: #121211;
      --accent: #350505;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161613;
        --surface: #252520;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.22);
        --text: #f0ede6;
        --text-muted: #9b9890;
        --accent: #f0ede6;
      }
    }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* ── Back link ── */
    .back-link {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }

    /* ── Header ── */
    .header { margin-bottom: 2.5rem; }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 400;
      font-style: italic;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    .header p {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ── Section label ── */
    .section-header {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-header::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border);
    }

    /* ── Grid ── */
    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    /* ── Card ── */
    .board-card {
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      background: var(--surface);
    }
    .board-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-3px);
    }
    .board-card img {
      width: 100%;
      display: block;
    }
    .card-meta {
      padding: 10px 12px;
      border-top: 0.5px solid var(--border);
    }
    .card-meta .label {
      font-size: 11px;
      color: var(--text);
      display: block;
      letter-spacing: 0.5px;
    }
    .card-meta .hint {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
      letter-spacing: 0.3px;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 86vh;
      border-radius: var(--radius-lg);
      border: 0.5px solid rgba(255,255,255,0.15);
      display: block;
    }
    .lightbox-close {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: none;
      border: 0.5px solid rgba(255,255,255,0.3);
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: var(--radius-md);
      cursor: pointer;
      letter-spacing: 1px;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.08); }
    .lightbox-label {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="app">
  <a href="../index.html" class="back-link">← back to the blooming in small machines</a>

  <div class="header">
    <h1>personal archive</h1>
    <p>saved boards &nbsp;·&nbsp; the blooming in small machines</p>
  </div>

  <div class="section-header">Boards</div>

  <div class="board-grid" id="board-grid"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightbox-close">close ✕</button>
  <img id="lightbox-img" src="" alt="" />
  <span class="lightbox-label" id="lightbox-label"></span>
</div>

<script>
  const BOARDS = [
    'board1.png','board2.png','board3.png','board4.png',
    'board5.png','board6.png','board7.png','board8.png'
  ];

  const grid = document.getElementById('board-grid');

  BOARDS.forEach((filename, i) => {
    const src = `breadboards/${filename}`;

    const card = document.createElement('div');
    card.className = 'board-card';

    const img = document.createElement('img');
    img.src = src;
    img.alt = `Board ${i + 1}`;
    img.loading = 'lazy';

    const meta = document.createElement('div');
    meta.className = 'card-meta';
    meta.innerHTML = `
      <span class="label">board_${String(i + 1).padStart(2, '0')}</span>
      <span class="hint">click to enlarge · right-click to save</span>
    `;

    card.appendChild(img);
    card.appendChild(meta);
    card.addEventListener('click', () => openLightbox(src, `board_${String(i+1).padStart(2,'0')}`));
    grid.appendChild(card);
  });

  // Lightbox
  const lightbox = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lightbox-img');
  const lbLabel  = document.getElementById('lightbox-label');

  function openLightbox(src, label) {
    lbImg.src = src;
    lbLabel.textContent = label;
    lightbox.classList.add('open');
  }

  document.getElementById('lightbox-close').addEventListener('click', () => {
    lightbox.classList.remove('open');
  });

  lightbox.addEventListener('click', e => {
    if (e.target === lightbox) lightbox.classList.remove('open');
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') lightbox.classList.remove('open');
  });
</script>
</body>
</html>
